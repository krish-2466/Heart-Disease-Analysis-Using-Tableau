<svg width="500" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF2FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="400" fill="url(#bgGrad)"/>
  
  <!-- Server rack left -->
  <rect x="30" y="100" width="60" height="200" rx="8" fill="#4169E1" opacity="0.8"/>
  <circle cx="60" cy="130" r="4" fill="#FFF"/>
  <circle cx="60" cy="150" r="4" fill="#FFF"/>
  <circle cx="60" cy="170" r="4" fill="#FFF"/>
  <rect x="40" y="200" width="40" height="3" fill="#FFF" opacity="0.6"/>
  <rect x="40" y="210" width="40" height="3" fill="#FFF" opacity="0.6"/>
  <rect x="40" y="220" width="40" height="3" fill="#FFF" opacity="0.6"/>
  
  <!-- Server rack right -->
  <rect x="410" y="100" width="60" height="200" rx="8" fill="#6366F1" opacity="0.8"/>
  <circle cx="440" cy="130" r="4" fill="#FFF"/>
  <circle cx="440" cy="150" r="4" fill="#FFF"/>
  <circle cx="440" cy="170" r="4" fill="#FFF"/>
  <rect x="420" y="200" width="40" height="3" fill="#FFF" opacity="0.6"/>
  <rect x="420" y="210" width="40" height="3" fill="#FFF" opacity="0.6"/>
  <rect x="420" y="220" width="40" height="3" fill="#FFF" opacity="0.6"/>
  
  <!-- Main monitor/laptop -->
  <rect x="150" y="80" width="200" height="140" rx="8" fill="#4169E1"/>
  <rect x="160" y="90" width="180" height="110" fill="#FFF"/>
  
  <!-- Chart on screen -->
  <rect x="170" y="100" width="30" height="60" fill="#4169E1" opacity="0.6"/>
  <rect x="210" y="120" width="30" height="40" fill="#6366F1" opacity="0.6"/>
  <rect x="250" y="110" width="30" height="50" fill="#FFA500" opacity="0.6"/>
  <rect x="290" y="130" width="30" height="30" fill="#4169E1" opacity="0.6"/>
  
  <!-- Line chart -->
  <polyline points="170,180 200,170 230,175 260,165 290,168 320,160" 
            fill="none" stroke="#4169E1" stroke-width="2"/>
  
  <!-- Monitor base -->
  <rect x="220" y="220" width="60" height="8" rx="4" fill="#4169E1" opacity="0.6"/>
  <rect x="235" y="228" width="30" height="30" rx="4" fill="#4169E1" opacity="0.4"/>
  
  <!-- People figures -->
  <!-- Person 1 - left -->
  <circle cx="120" cy="240" r="12" fill="#4169E1"/>
  <rect x="110" y="255" width="20" height="30" rx="4" fill="#4169E1"/>
  <rect x="105" y="260" width="8" height="20" rx="3" fill="#4169E1" opacity="0.8"/>
  <rect x="127" y="260" width="8" height="20" rx="3" fill="#4169E1" opacity="0.8"/>
  
  <!-- Person 2 - right -->
  <circle cx="380" cy="240" r="12" fill="#6366F1"/>
  <rect x="370" y="255" width="20" height="30" rx="4" fill="#6366F1"/>
  <rect x="365" y="260" width="8" height="20" rx="3" fill="#6366F1" opacity="0.8"/>
  <rect x="387" y="260" width="8" height="20" rx="3" fill="#6366F1" opacity="0.8"/>
  
  <!-- Person 3 - center front -->
  <circle cx="250" cy="280" r="14" fill="#FFA500"/>
  <rect x="238" y="297" width="24" height="35" rx="4" fill="#FFA500"/>
  <rect x="232" y="302" width="10" height="25" rx="3" fill="#FFA500" opacity="0.8"/>
  <rect x="258" y="302" width="10" height="25" rx="3" fill="#FFA500" opacity="0.8"/>
  
  <!-- Floating data elements -->
  <circle cx="100" cy="60" r="8" fill="#4169E1" opacity="0.3"/>
  <circle cx="400" cy="70" r="6" fill="#6366F1" opacity="0.3"/>
  <rect x="130" y="320" width="12" height="12" rx="2" fill="#4169E1" opacity="0.3"/>
  <rect x="360" y="310" width="12" height="12" rx="2" fill="#FFA500" opacity="0.3"/>
</svg>
