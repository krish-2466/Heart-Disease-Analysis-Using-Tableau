<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CardioInsight — Heart Disease Data Analysis with interactive Tableau dashboards">
    <title>{% block title %}CardioInsight — Heart Disease Analysis{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header class="header" id="site-header">
        <nav class="nav container">

            <a href="{{ url_for('index') }}" class="logo">
                <div class="logo-pulse">🫀</div>
                Cardio<span class="accent-dot">Insight</span>
            </a>

            <ul class="nav-links" id="nav-links">
                <li><a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Home</a></li>
                <li><a href="{{ url_for('about') }}" class="nav-link {% if request.endpoint == 'about' %}active{% endif %}">About</a></li>
                <li><a href="{{ url_for('visualizations') }}" class="nav-link {% if request.endpoint == 'visualizations' %}active{% endif %}">Visualizations</a></li>
                <li><a href="{{ url_for('dashboard') }}" class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">Dashboard</a></li>
                <li><a href="{{ url_for('story') }}" class="nav-link {% if request.endpoint == 'story' %}active{% endif %}">Story</a></li>
                <li><a href="{{ url_for('contact') }}" class="nav-link {% if request.endpoint == 'contact' %}active{% endif %}">Contact</a></li>
            </ul>

            <a href="{{ url_for('dashboard') }}" class="btn-nav-cta">View Dashboard</a>

            <button class="mobile-menu-toggle" id="mobile-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-brand">
                    <div class="logo-pulse">🫀</div>
                    CardioInsight
                </div>
                <p class="footer-copy">&copy; 2026 CardioInsight. Built with Flask &amp; Tableau.</p>
                <nav class="footer-links">
                    <a href="{{ url_for('about') }}">About</a>
                    <a href="{{ url_for('visualizations') }}">Visualizations</a>
                    <a href="{{ url_for('contact') }}">Contact</a>
                </nav>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
